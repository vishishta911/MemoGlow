<!DOCTYPE html>
<html>

<head>
    <title>Register - MemoGlow</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body class="bg-light">

{% include 'navbar.html' %}

<div class="container mt-5">

    <h1 class="text-center mb-4">
        Register as
    </h1>

    <div class="row">

        <!-- Caregiver Card -->
        <div class="col-md-6">

            <div class="card shadow p-4 text-center">

                <h2>👨‍⚕️ Caregiver</h2>

                <p>Create a caregiver account.</p>

                <button
                    class="btn btn-primary"
                    onclick="showCaregiverForm()">
                    Continue
                </button>

            </div>

        </div>

        <!-- Patient Card -->
        <div class="col-md-6">

            <div class="card shadow p-4 text-center">

                <h2>👴 Patient</h2>

                <p>Create a patient account.</p>

                <button
                    class="btn btn-success"
                    onclick="showPatientForm()">
                    Continue
                </button>

            </div>

        </div>

    </div>

    <!-- Caregiver Form -->
    <div
        id="caregiverForm"
        class="card shadow p-4 mt-5"
        style="display:none;">

        <h3 class="mb-4">
            Caregiver Registration
        </h3>

        <input
            id="cg_name"
            class="form-control mb-3"
            placeholder="Name">

        <input
            id="cg_email"
            class="form-control mb-3"
            placeholder="Email">

        <input
            id="cg_phone"
            class="form-control mb-3"
            placeholder="Phone Number">

        <input
            id="cg_password"
            type="password"
            class="form-control mb-3"
            placeholder="Password">

        <button
            class="btn btn-primary"
            onclick="caregiverRegister()">
            Register Caregiver
        </button>

    </div>

    <!-- Patient Form -->
    <div
        id="patientForm"
        class="card shadow p-4 mt-5"
        style="display:none;">

        <h3 class="mb-4">
            Patient Registration
        </h3>

        <input
            id="pt_name"
            class="form-control mb-3"
            placeholder="Name">

        <input
            id="pt_age"
            type="number"
            class="form-control mb-3"
            placeholder="Age">

        <input
            id="pt_password"
            type="password"
            class="form-control mb-3"
            placeholder="Password">

        <input
            id="pt_code"
            class="form-control mb-3"
            placeholder="Caregiver Code">

        <button
            class="btn btn-success"
            onclick="patientRegister()">
            Register Patient
        </button>

    </div>

</div>

<script>

function showCaregiverForm() {

    document.getElementById("caregiverForm").style.display = "block";
    document.getElementById("patientForm").style.display = "none";

}

function showPatientForm() {

    document.getElementById("patientForm").style.display = "block";
    document.getElementById("caregiverForm").style.display = "none";

}

async function caregiverRegister() {

    const response = await fetch(
        "/caregiver/signup",
        {
            method: "POST",

            headers: {
                "Content-Type": "application/json"
            },

            body: JSON.stringify({
                name: document.getElementById("cg_name").value,
                email: document.getElementById("cg_email").value,
                phone: document.getElementById("cg_phone").value,
                password: document.getElementById("cg_password").value
            })
        }
    );

    const data = await response.json();

    alert(
    "Registration Successful!\n\n" +
    "Your Caregiver Code: " +
    data.caregiver_code +
    "\n\nPlease save this code and share it with your patient."
   );

   window.location.href = "/login?role=caregiver";
}

async function patientRegister() {

    const response = await fetch(
        "/patient/signup",
        {
            method: "POST",

            headers: {
                "Content-Type": "application/json"
            },

            body: JSON.stringify({
                name: document.getElementById("pt_name").value,
                age: document.getElementById("pt_age").value,
                password: document.getElementById("pt_password").value,
                caregiver_code:
                    document.getElementById("pt_code").value
            })
        }
    );

    const data = await response.json();

    alert(data.message);
    window.location.href = "/login?role=patient";

}

</script>

</body>
</html>
