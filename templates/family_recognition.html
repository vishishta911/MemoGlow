{% include 'navbar.html' %}

<!DOCTYPE html>
<html>
<head>
    <title>Family Recognition - MemoGlow</title>
    <p class="text-muted">
        Managing family members for Patient #{{ patient_id }}
    </p>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow p-4">

        <h1>👨‍👩‍👧 Family Recognition</h1>

        <p class="text-muted">
            Add family members for patient recognition.
        </p>

        <hr>
        <input
        id="patient_id"
        value="{{ patient_id }}"
        hidden>
        <!-- <input
            id="patient_id"
            class="form-control mb-3"
            placeholder="Patient ID"> -->

        <input
            id="name"
            class="form-control mb-3"
            placeholder="Family Member Name">

        <input
            id="relationship"
            class="form-control mb-3"
            placeholder="Relationship">

        <button
            class="btn btn-primary"
            onclick="saveFamilyMember()">
            Save Family Member
        </button>
        <hr>

        <h4>Family Members</h4>

        <div id="familyList">
            Loading...
        </div>

    </div>

</div>

<script>

async function saveFamilyMember() {

    const response = await fetch(
        "/family/add",
        {
            method: "POST",

            headers: {
                "Content-Type": "application/json"
            },

            body: JSON.stringify({
                patient_id:
                    document.getElementById("patient_id").value,

                name:
                    document.getElementById("name").value,

                relationship:
                    document.getElementById("relationship").value
            })
        }
    );

    const data = await response.json();

    alert(data.message);

    loadFamilyMembers();
}
async function loadFamilyMembers() {

    const patientId =
        document.getElementById("patient_id").value;

    if(patientId === ""){
        return;
    }

    const response = await fetch(
        `/family/all/${patientId}`
    );

    const members =
        await response.json();

    let html = "";

    if(members.length === 0){

        html = `
        <div class="alert alert-warning">
            No family members added.
        </div>
        `;
    }

    else {

        members.forEach(member => {

            html += `
            <div class="card mb-2">

                <div class="card-body">

                    <h5>
                        👤 ${member.name}
                    </h5>

                    <p>
                        ${member.relationship}
                    </p>

                    <button
                        class="btn btn-danger btn-sm"
                        onclick="deleteMember(${member.id})">

                        Delete

                    </button>

                </div>

            </div>
            `;
        });
    }

    document.getElementById("familyList").innerHTML =
        html;
}


async function deleteMember(memberId) {

    await fetch(
        `/family/delete/${memberId}`,
        {
            method: "DELETE"
        }
    );

    loadFamilyMembers();
}
document
    .getElementById("patient_id")
    .addEventListener(
        "input",
        loadFamilyMembers
    );

window.onload = function() {

    loadFamilyMembers();

};
</script>
</body>
</html>
