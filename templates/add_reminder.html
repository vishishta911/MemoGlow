{% include 'navbar.html' %}
<!DOCTYPE html>
<html>
<head>
    <title>Add Reminder - MemoGlow</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-8">

            <div class="card shadow p-4">

                <h2 class="mb-4">⏰ Add Reminder</h2>

                <div class="mb-3">
                    <label>Patient ID</label>

                    <input
                        type="number"
                        id="patient_id"
                        class="form-control">
                </div>

                <div class="mb-3">
                    <label>Reminder Text</label>

                    <textarea
                        id="reminder_text"
                        class="form-control"
                        rows="3"></textarea>
                </div>

                <div class="mb-3">
                    <label>Reminder Time</label>

                    <input
                        type="datetime-local"
                        id="reminder_time"
                        class="form-control">
                </div>

                <button
                    class="btn btn-success"
                    onclick="addReminder()">

                    Add Reminder

                </button>

                <div
                    id="message"
                    class="mt-3">
                </div>

            </div>

        </div>

    </div>

</div>

<script>

async function addReminder() {

    const patient_id =
        document.getElementById("patient_id").value;

    const reminder_text =
        document.getElementById("reminder_text").value;

    const reminder_time =
        document.getElementById("reminder_time").value;

    if(
        patient_id === "" ||
        reminder_text === "" ||
        reminder_time === ""
    ) {

        alert("Please fill all fields.");

        return;
    }

    const response = await fetch(
        "/reminder/add",
        {
            method: "POST",

            headers: {
                "Content-Type": "application/json"
            },

            body: JSON.stringify({
                patient_id: patient_id,
                reminder_text: reminder_text,
                reminder_time: reminder_time
            })
        }
    );

    const data = await response.json();

    document.getElementById("message").innerHTML =
        `
        <div class="alert alert-success">
            ${data.message}
        </div>
        `;
}

</script>

</body>
</html>
