{% include 'navbar.html' %}
<!DOCTYPE html>
<html>
<head>
    <title>Patient Dashboard - MemoGlow</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow p-4">

        <h1>🧓 Patient Dashboard</h1>

        <p class="lead">
            Welcome {{ patient_name }}
        </p>

        <hr>

        <h4>Today's Reminders</h4>

        <div id="reminders">
            Loading reminders...
        </div>

        <hr>

        <h4>MemoGlow Assistant</h4>

        <p>
            Ask questions about your memories.
        </p>

        <a href="/assistant"
           class="btn btn-primary">
            Open MemoGlow Assistant
        </a>

        <a href="/memory-timeline"
           class="btn btn-success">
            View Memory Timeline
        </a>

    </div>

</div>

<script>

async function loadReminders() {

    const response = await fetch(
        "/reminder/all/{{ patient_id }}"
    );

    const reminders = await response.json();

    let html = "";

    if(reminders.length === 0){

        html = `
        <div class="alert alert-warning">
            No reminders found.
        </div>
        `;

    } else {

        reminders.forEach(reminder => {

            html += `
            <div class="card mb-2">

                <div class="card-body">

                    <h6>
                        ${reminder.reminder_text}
                    </h6>

                    <small>
                        ${reminder.reminder_time}
                    </small>

                    <br><br>

                    <span class="badge ${
                        reminder.status === "Completed"
                        ? "bg-success"
                        : "bg-warning"
                    }">
                        ${reminder.status}
                    </span>

                    <br><br>

                    ${
                        reminder.status !== "Completed"
                        ? `
                        <button
                            class="btn btn-success btn-sm"
                            onclick="completeReminder(${reminder.id})">
                            ✓ Complete
                        </button>
                        `
                        : ""
                    }

                </div>

            </div>
            `;

        });

    }

    document.getElementById("reminders").innerHTML =
        html;
}

async function completeReminder(reminderId) {

    const response = await fetch(
        `/reminder/complete/${reminderId}`,
        {
            method: "PUT"
        }
    );

    const data = await response.json();

    alert(data.message);

    loadReminders();
}

loadReminders();

</script>

</body>
</html>
