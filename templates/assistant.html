{% include 'navbar.html' %}
<!DOCTYPE html>
<html>
<head>
    <title>MemoGlow Assistant</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <h1 class="mb-4">🤖 MemoGlow Assistant</h1>

    <div class="card shadow p-4">

        <label class="mb-2">
            Ask a Question
        </label>

        <input
            type="text"
            id="question"
            class="form-control mb-3"
            placeholder="Who visited me today?">

        <button
            class="btn btn-primary"
            onclick="askAssistant()">
            Ask MemoGlow
        </button>

    </div>

    <div class="card shadow p-4 mt-4">

        <h4>Answer</h4>

        <div id="answer" class="text-muted">
            Enter a question and click Ask MemoGlow.
        </div>

    </div>

</div>

<script>

async function askAssistant() {

    const question =
        document.getElementById("question").value.trim();

    if (question === "") {

        alert("Please enter a question.");

        return;
    }

    document.getElementById("answer").innerHTML =
        "🤖 Thinking...";

    const response = await fetch(
        "/assistant/ask",
        {
            method: "POST",

            headers: {
                "Content-Type": "application/json"
            },

            body: JSON.stringify({
                question: question
            })
        }
    );

    const data = await response.json();

    document.getElementById("answer").innerHTML =
        `
        <b>Retrieved Memory:</b><br>
        ${data.retrieved_memory}

        <hr>

        <b>AI Answer:</b><br>
        ${data.answer}
        `;
}

</script>

</body>
</html>
