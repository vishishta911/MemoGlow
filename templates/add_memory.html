{% include 'navbar.html' %}
<!DOCTYPE html>
<html>
<head>
    <title>Add Memory - MemoGlow</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-8">

            <div class="card shadow p-4">

                <h2 class="mb-4">🧠 Add Memory</h2>

                <div class="mb-3">
                    <label>Patient ID</label>
                    <p class="text-muted">
                        Adding memory for Patient #{{ patient_id }}
                    </p>
                </div>

                <div class="mb-3">
                    <label>Memory</label>
                    <textarea
                        id="memory_text"
                        class="form-control"
                        rows="4"></textarea>
                </div>

                <div class="mb-3">
                    <label>Category</label>

                    <select
                        id="category"
                        class="form-control">

                        <option>Family</option>
                        <option>Health</option>
                        <option>Friends</option>
                        <option>Events</option>

                    </select>
                </div>

                <button
                    class="btn btn-primary"
                    onclick="addMemory()">

                    Save Memory

                </button>

                <div
                    id="message"
                    class="mt-3">
                </div>

            </div>

        </div>

    </div>

</div>

<script>

async function addMemory() {

    const patient_id = Number("{{ patient_id }}");
    const memory_text =
        document.getElementById("memory_text").value;

    const category =
        document.getElementById("category").value;

    const response = await fetch(
        "/memory/add",
        {
            method: "POST",

            headers: {
                "Content-Type": "application/json"
            },

            body: JSON.stringify({
                patient_id: patient_id,
                memory_text: memory_text,
                category: category
            })
        }
    );

    const data = await response.json();

    document.getElementById("message").innerHTML =
        `<div class="alert alert-success">
            ${data.message}
        </div>`;
}

</script>

</body>
</html>
