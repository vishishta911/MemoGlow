{% include 'navbar.html' %}
<!DOCTYPE html>
<html>
<head>
    <title>Login - MemoGlow</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<script>


async function caregiverLogin() {

    const email =
        document.getElementById("email").value;

    const password =
        document.getElementById("password").value;

    const response = await fetch(
        "/caregiver/login",
        {
            method: "POST",

            headers: {
                "Content-Type": "application/json"
            },

            body: JSON.stringify({
                email: email,
                password: password
            })
        }
    );

    const data = await response.json();

    if(data.message === "Login Successful") {

        window.location.href =
            "/caregiver/dashboard";

    } else {

        alert(data.message);

    }

}

async function patientLogin() {

    const name =
        document.getElementById("name").value;

    const password =
        document.getElementById("password").value;

    const response = await fetch(
        "/patient/login",
        {
            method: "POST",

            headers: {
                "Content-Type": "application/json"
            },

            body: JSON.stringify({
                name: name,
                password: password
            })
        }
    );

    const data = await response.json();

    if(data.message === "Login Successful") {

        window.location.href =
            "/patient/dashboard";

    } else {

        alert(data.message);

    }

}


</script>
<body class="bg-light">

<div class="container">

    <div class="row justify-content-center mt-5">

        <div class="col-md-5">

            <div class="card shadow p-4">

                {% if role == "caregiver" %}

                <h2 class="text-center mb-4">
                    👨‍⚕️ Caregiver Login
                </h2>

                <form>

                    <div class="mb-3">
                        <label>Email</label>
                        <input
                            type="email"
                            class="form-control"
                            id="email">
                    </div>

                    <div class="mb-3">
                        <label>Password</label>
                        <input
                            type="password"
                            class="form-control"
                            id="password">
                    </div>

                    <button
                        type="button"
                        class="btn btn-primary w-100"
                        onclick="caregiverLogin()">
                        Login
                    </button>

                </form>

                {% else %}

                <h2 class="text-center mb-4">
                    🧓 Patient Login
                </h2>

                <form>

                    <div class="mb-3">
                        <label>Name</label>
                        <input
                            type="text"
                            class="form-control"
                            id="name">
                    </div>

                    <div class="mb-3">
                        <label>Password</label>
                        <input
                            type="password"
                            class="form-control"
                            id="password">
                    </div>

                    <button
                        type="button"
                        class="btn btn-success w-100"
                        onclick="patientLogin()">
                        Login
                    </button>

                </form>

                {% endif %}

            </div>

        </div>

    </div>

</div>

</body>
</html>
