{% include 'navbar.html' %}
<!DOCTYPE html>
<html>
<head>
    <title>Select Role</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">

    <div class="text-center mb-5">
        <h1>Choose Your Role</h1>
        <p class="lead">Continue as Caregiver or Patient</p>
    </div>

    <div class="row">

        <div class="col-md-6">
            <div class="card p-4 shadow text-center">
                <h2>👨‍⚕️ Caregiver</h2>
                <p>Manage memories and reminders.</p>
                <a href="/login?role=caregiver"
                   class="btn btn-primary">
                   Continue
                </a>
            </div>
        </div>

        <div class="col-md-6">
            <div class="card p-4 shadow text-center">
                <h2>🧓 Patient</h2>
                <p>Access MemoGlow assistant.</p>
                <a href="/login?role=patient"
                   class="btn btn-success">
                   Continue
                </a>
            </div>
        </div>

    </div>

</div>

</body>
</html>
